version: "3.8"

volumes:
  prometheus-data:
  grafana-data:
  trivy-cache:

services:
  prometheus:
    image: prom/prometheus:v2.49.1
    restart: unless-stopped
    user: root
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cat > /etc/prometheus/prometheus.yml << 'EOF'
        global:
          scrape_interval: 5s
          external_labels:
            monitor: "codelab-monitor"

        scrape_configs:
          - job_name: "prometheus"
            static_configs:
              - targets: ["prometheus:9090"]
          - job_name: "node_exporter"
            static_configs:
              - targets: ["node_exporter:9100"]
          - job_name: "trivy"
            scrape_interval: 2m
            scrape_timeout: 30s
            static_configs:
              - targets: ["trivy-exporter:9000"]
        EOF
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=15d \
          --web.enable-lifecycle
    volumes:
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monitoring-network

  grafana:
    image: grafana/grafana:10.3.1
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - monitoring-network

  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.7.0
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.systemd"
      - "--collector.processes"
    volumes:
      - "/:/host:ro,rslave"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monitoring-network

  trivy-exporter:
    image: aquasec/trivy:canary
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache python3 docker-cli 2>/dev/null

        METRICS_FILE=/cache/metrics.prom
        CACHE_DIR=/cache/trivycache

        # Write the Python HTTP server to a file
        cat > /tmp/serve.py << 'PYEOF'
        import http.server
        import os

        METRICS_FILE = "/cache/metrics.prom"

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_GET(self):
                if os.path.exists(METRICS_FILE):
                    with open(METRICS_FILE, "r") as f:
                        content = f.read()
                else:
                    content = "# Trivy scan not yet complete, please wait...\n"
                encoded = content.encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
                self.send_header("Content-Length", str(len(encoded)))
                self.end_headers()
                self.wfile.write(encoded)

            def log_message(self, format, *args):
                pass  # silence access logs

        print("Trivy metrics server listening on port 9000...")
        server = http.server.HTTPServer(("0.0.0.0", 9000), Handler)
        server.serve_forever()
        PYEOF

        # Write the scan script to a file
        cat > /tmp/scan.py << 'PYEOF'
        import subprocess, json, os, sys, time

        METRICS_FILE = "/cache/metrics.prom"
        TMP_FILE     = "/cache/metrics.tmp"
        CACHE_DIR    = "/cache/trivycache"

        os.makedirs(CACHE_DIR, exist_ok=True)

        def get_images():
            result = subprocess.run(
                ["docker", "images", "--format", "{{.Repository}}:{{.Tag}}"],
                capture_output=True, text=True
            )
            images = [
                i for i in result.stdout.strip().splitlines()
                if i and "<none>" not in i
            ]
            return list(set(images))

        def scan_image(image):
            result = subprocess.run(
                [
                    "trivy", "image",
                    "--format", "json",
                    "--quiet",
                    "--no-progress",
                    "--cache-dir", CACHE_DIR,
                    image
                ],
                capture_output=True, text=True, timeout=600
            )
            try:
                return json.loads(result.stdout)
            except Exception:
                return None

        def escape(val):
            return str(val).replace('"', '\\"').replace("\n", "")

        def write_metrics(all_metrics):
            with open(TMP_FILE, "w") as f:
                f.write("# HELP trivy_vulnerabilities Vulnerability detected by trivy\n")
                f.write("# TYPE trivy_vulnerabilities gauge\n")
                for line in all_metrics:
                    f.write(line + "\n")
            os.replace(TMP_FILE, METRICS_FILE)

        while True:
            images = get_images()
            print(f"[trivy-scan] Found {len(images)} images to scan", flush=True)
            all_metrics = []

            for image in images:
                print(f"[trivy-scan] Scanning {image} ...", flush=True)
                data = scan_image(image)
                if not data:
                    print(f"[trivy-scan] No data for {image}", flush=True)
                    continue

                count = 0
                for result in data.get("Results", []):
                    for vuln in result.get("Vulnerabilities") or []:
                        labels = (
                            f'image="{escape(image)}",'
                            f'package="{escape(vuln.get("PkgName",""))}",'
                            f'severity="{escape(vuln.get("Severity","UNKNOWN"))}",'
                            f'vuln_id="{escape(vuln.get("VulnerabilityID",""))}",'
                            f'installed="{escape(vuln.get("InstalledVersion",""))}",'
                            f'fixed="{escape(vuln.get("FixedVersion",""))}"'
                        )
                        all_metrics.append(f"trivy_vulnerabilities{{{labels}}} 1")
                        count += 1

                print(f"[trivy-scan] {image} -> {count} vulnerabilities", flush=True)

            write_metrics(all_metrics)
            total = len(all_metrics)
            print(f"[trivy-scan] Scan complete. {total} total vulnerabilities written.", flush=True)
            print(f"[trivy-scan] Next scan in 6 hours.", flush=True)
            time.sleep(21600)
        PYEOF

        # Start HTTP server in background
        python3 /tmp/serve.py &

        # Start scan loop in foreground
        python3 /tmp/scan.py
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - trivy-cache:/cache
    networks:
      - monitoring-network

networks:
  monitoring-network:
    driver: bridge
