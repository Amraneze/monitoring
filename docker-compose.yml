version: "3.8"

volumes:
  prometheus-data:
  grafana-data:
  trivy-cache:
  process-exporter-config:

services:

  # ── 1. PROMETHEUS ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    restart: unless-stopped
    user: root
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cat > /etc/prometheus/prometheus.yml << 'EOF'
        global:
          scrape_interval: 15s
          evaluation_interval: 15s
          external_labels:
            monitor: "server-health"

        scrape_configs:
          - job_name: "prometheus"
            static_configs:
              - targets: ["prometheus:9090"]

          - job_name: "node_exporter"
            scrape_interval: 10s
            static_configs:
              - targets: ["node_exporter:9100"]

          - job_name: "process_exporter"
            scrape_interval: 10s
            static_configs:
              - targets: ["process_exporter:9256"]

          - job_name: "smartctl_exporter"
            scrape_interval: 60s
            static_configs:
              - targets: ["smartctl_exporter:9633"]

          - job_name: "rasdaemon_exporter"
            scrape_interval: 30s
            static_configs:
              - targets: ["rasdaemon_exporter:9101"]

          - job_name: "trivy"
            scrape_interval: 2m
            scrape_timeout: 30s
            static_configs:
              - targets: ["trivy_exporter:9000"]
        EOF
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=30d \
          --web.enable-lifecycle
    volumes:
      - prometheus-data:/prometheus
    deploy:
      resources:
        limits:
          cpus: "1.0"       # Prometheus is query-heavy but doesn't need more than 1 core
          memory: 512M      # currently using 246MB — give headroom for query spikes
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monitoring-network

  # ── 2. GRAFANA ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      SERVICE_FQDN_GRAFANA: ${SERVICE_FQDN_GRAFANA}
    volumes:
      - grafana-data:/var/lib/grafana
    deploy:
      resources:
        limits:
          cpus: "0.5"       # currently 0.34% — 0.5 core is plenty with room to spike
          memory: 256M      # currently 65MB — 256M gives room for dashboard rendering
        reservations:
          cpus: "0.05"
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - monitoring-network

  # ── 3. NODE EXPORTER ─────────────────────────────────────────────────────────
  # ⚠️  Was using 628% CPU — caused by --collector.processes iterating all
  # host PIDs every scrape interval. Fixed by removing that collector and
  # using process_exporter instead (which is purpose-built for this).
  # Also removed --collector.vmstat and --collector.netstat to reduce load.
  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.7.0
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.diskstats"
      - "--collector.filesystem"
      - "--collector.meminfo"
      - "--collector.cpu"
      - "--collector.loadavg"
      - "--collector.hwmon"
      - "--collector.edac"
      - "--collector.netstat"
      - "--collector.stat"
      # Removed: --collector.processes  ← this was causing the 628% CPU spike
      # Removed: --collector.vmstat     ← reduces per-scrape work
      # Removed: --collector.systemd    ← blocked by AppArmor on this host
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|run/docker/.+)($$|/)'
    volumes:
      - /:/host:ro,rslave
    deploy:
      resources:
        limits:
          cpus: "0.2"       # should be well under this without --collector.processes
          memory: 64M       # currently 24MB — 64M is generous
        reservations:
          cpus: "0.02"
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monitoring-network

  # ── 4a. PROCESS CONFIG INIT ───────────────────────────────────────────────────
  process-config-init:
    image: alpine:3.19
    container_name: process_config_init
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cat > /config/process-exporter.yml << 'EOF'
        process_names:
          - name: "{{.Comm}}"
            cmdline:
              - ".+"
        EOF
        echo "process-exporter config written:"
        cat /config/process-exporter.yml
    volumes:
      - process-exporter-config:/config
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 32M

  # ── 4b. PROCESS EXPORTER ─────────────────────────────────────────────────────
  process_exporter:
    image: ncabatoff/process-exporter:latest
    container_name: process_exporter
    restart: unless-stopped
    privileged: true
    pid: host
    depends_on:
      - process-config-init
    command:
      - "--config.path=/config/process-exporter.yml"
      - "--procfs=/host/proc"
    volumes:
      - /proc:/host/proc:ro
      - process-exporter-config:/config:ro
    deploy:
      resources:
        limits:
          cpus: "0.3"       # currently 3.28% avg — 0.3 core cap allows spikes
          memory: 128M      # currently 54MB — 128M gives room
        reservations:
          cpus: "0.05"
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9256/metrics > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - monitoring-network

  # ── 5. SMARTCTL EXPORTER ─────────────────────────────────────────────────────
  smartctl_exporter:
    image: prometheuscommunity/smartctl-exporter:v0.12.0
    container_name: smartctl_exporter
    restart: unless-stopped
    privileged: true
    user: root
    command:
      - "--smartctl.path=/usr/sbin/smartctl"
      - "--smartctl.interval=120s"
    volumes:
      - /dev:/dev:ro
    deploy:
      resources:
        limits:
          cpus: "0.1"       # currently ~0% — SMART reads are infrequent
          memory: 64M       # currently 11MB — 64M is very generous
        reservations:
          cpus: "0.01"
          memory: 16M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9633/metrics"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - monitoring-network

  # ── 6. RASDAEMON EXPORTER ────────────────────────────────────────────────────
  rasdaemon_exporter:
    image: python:3.12-alpine
    container_name: rasdaemon_exporter
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        pip install --quiet --no-cache-dir prometheus_client 2>/dev/null
        cat > /exporter.py << 'PYEOF'
        import os, time, sqlite3, logging
        from prometheus_client import start_http_server, Gauge

        DB_PATH = os.environ.get("RASDAEMON_DB", "/var/lib/rasdaemon/ras-mc_event.db")
        PORT    = int(os.environ.get("LISTEN_PORT", "9101"))
        logging.basicConfig(level=logging.INFO, format="%(asctime)s %(message)s")

        mce_total    = Gauge("rasdaemon_mce_events_total", "Total MCE events recorded by rasdaemon")
        mce_by_type  = Gauge("rasdaemon_mce_events_by_type", "MCE events by error type", ["error_type"])
        db_available = Gauge("rasdaemon_db_available", "1 if rasdaemon DB is readable")

        def collect():
            if not os.path.exists(DB_PATH):
                db_available.set(0)
                mce_total.set(0)
                return
            try:
                conn = sqlite3.connect(f"file:{DB_PATH}?mode=ro", uri=True, timeout=5)
                cur  = conn.cursor()
                cur.execute("SELECT COUNT(*) FROM mce_record")
                total = cur.fetchone()[0] or 0
                mce_total.set(total)
                db_available.set(1)
                try:
                    cur.execute("SELECT error_msg, COUNT(*) FROM mce_record GROUP BY error_msg LIMIT 50")
                    for row in cur.fetchall():
                        mce_by_type.labels(error_type=(row[0] or "unknown")[:120]).set(row[1])
                except sqlite3.OperationalError:
                    pass
                conn.close()
                logging.info(f"Collected: {total} MCE events total")
            except Exception as e:
                logging.error(f"DB read error: {e}")
                db_available.set(0)

        logging.info(f"rasdaemon exporter starting on :{PORT}")
        start_http_server(PORT)
        while True:
            collect()
            time.sleep(30)
        PYEOF
        exec python3 /exporter.py
    environment:
      - RASDAEMON_DB=/var/lib/rasdaemon/ras-mc_event.db
      - LISTEN_PORT=9101
    volumes:
      - /var/lib/rasdaemon:/var/lib/rasdaemon:ro
    deploy:
      resources:
        limits:
          cpus: "0.1"       # currently 0.04% — very light
          memory: 64M       # currently 16MB — 64M is plenty
        reservations:
          cpus: "0.01"
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9101/metrics"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - monitoring-network

  # ── 7. TRIVY EXPORTER ────────────────────────────────────────────────────────
  # Note: trivy scans are CPU/memory intensive during the scan window (every 6h).
  # Limit is set high enough to not stall scans but prevent runaway usage.
  trivy_exporter:
    image: aquasec/trivy:canary
    container_name: trivy_exporter
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache python3 docker-cli 2>/dev/null

        cat > /tmp/serve.py << 'PYEOF'
        import http.server, os

        METRICS_FILE = "/cache/metrics.prom"

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_GET(self):
                if os.path.exists(METRICS_FILE):
                    with open(METRICS_FILE, "r") as f:
                        content = f.read()
                else:
                    content = "# Trivy scan not yet complete, please wait...\n"
                encoded = content.encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
                self.send_header("Content-Length", str(len(encoded)))
                self.end_headers()
                self.wfile.write(encoded)
            def log_message(self, format, *args):
                pass

        print("Trivy metrics server listening on port 9000...")
        http.server.HTTPServer(("0.0.0.0", 9000), Handler).serve_forever()
        PYEOF

        cat > /tmp/scan.py << 'PYEOF'
        import subprocess, json, os, time

        METRICS_FILE = "/cache/metrics.prom"
        TMP_FILE     = "/cache/metrics.tmp"
        CACHE_DIR    = "/cache/trivycache"

        os.makedirs(CACHE_DIR, exist_ok=True)

        def get_images():
            result = subprocess.run(
                ["docker", "images", "--format", "{{.Repository}}:{{.Tag}}"],
                capture_output=True, text=True
            )
            images = [i for i in result.stdout.strip().splitlines() if i and "<none>" not in i]
            return list(set(images))

        def scan_image(image):
            result = subprocess.run(
                ["trivy", "image", "--format", "json", "--quiet",
                 "--no-progress", "--cache-dir", CACHE_DIR, image],
                capture_output=True, text=True, timeout=600
            )
            try:
                return json.loads(result.stdout)
            except Exception:
                return None

        def escape(val):
            return str(val).replace('"', '\\"').replace("\n", "")

        def write_metrics(all_metrics):
            with open(TMP_FILE, "w") as f:
                f.write("# HELP trivy_vulnerabilities Vulnerability detected by trivy\n")
                f.write("# TYPE trivy_vulnerabilities gauge\n")
                for line in all_metrics:
                    f.write(line + "\n")
            os.replace(TMP_FILE, METRICS_FILE)

        while True:
            images = get_images()
            print(f"[trivy-scan] Scanning {len(images)} images...", flush=True)
            all_metrics = []
            for image in images:
                print(f"[trivy-scan] Scanning {image}...", flush=True)
                data = scan_image(image)
                if not data:
                    continue
                count = 0
                for result in data.get("Results", []):
                    for vuln in result.get("Vulnerabilities") or []:
                        labels = (
                            f'image="{escape(image)}",'
                            f'package="{escape(vuln.get("PkgName",""))}",'
                            f'severity="{escape(vuln.get("Severity","UNKNOWN"))}",'
                            f'vuln_id="{escape(vuln.get("VulnerabilityID",""))}",'
                            f'installed="{escape(vuln.get("InstalledVersion",""))}",'
                            f'fixed="{escape(vuln.get("FixedVersion",""))}"'
                        )
                        all_metrics.append(f"trivy_vulnerabilities{{{labels}}} 1")
                        count += 1
                print(f"[trivy-scan] {image} -> {count} vulnerabilities", flush=True)
            write_metrics(all_metrics)
            print(f"[trivy-scan] Done. {len(all_metrics)} total. Next scan in 6h.", flush=True)
            time.sleep(21600)
        PYEOF

        python3 /tmp/serve.py &
        python3 /tmp/scan.py
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - trivy-cache:/cache
    deploy:
      resources:
        limits:
          cpus: "2.0"       # scans are CPU intensive — needs room during scan window
          memory: 512M      # currently 48MB idle, spikes during scans with many images
        reservations:
          cpus: "0.05"
          memory: 64M
    networks:
      - monitoring-network

networks:
  monitoring-network:
    driver: bridge
